version: "3"

vars:
  IMAGE: ghcr.io/hostmaster/usdt_monitor_bot
  TAG:
    sh: git rev-parse --short HEAD

tasks:
  build:
    desc: Build Docker image (linux/amd64, tagged with git SHA)
    run: once
    cmds:
      - docker build --platform linux/amd64 -t {{.IMAGE}}:{{.TAG}} .

  login:
    desc: Login to GitHub Container Registry (requires CR_PAT env var)
    run: once
    cmds:
      - echo "{{.CR_PAT}}" | docker login ghcr.io -u hostmaster --password-stdin

  tag-stable:
    desc: Tag and push image as stable
    deps: [build, login]
    cmds:
      - docker tag {{.IMAGE}}:{{.TAG}} {{.IMAGE}}:stable
      - docker push {{.IMAGE}}:stable

  push:
    desc: Push SHA-tagged image to GitHub Container Registry (requires CR_PAT env var)
    deps: [build, login]
    cmds:
      - docker push {{.IMAGE}}:{{.TAG}}

  all:
    desc: Build and push Docker image
    cmds:
      - task: push

  run:
    desc: Run Docker container
    cmds:
      - docker compose up --build

  deploy:
    desc: Build, push, tag stable, and sync to server
    cmds:
      - task: push
      - task: tag-stable
      - task: sync

  sync:
    desc: Sync config files to server (requires TARGET_HOST env var)
    cmds:
      - rsync -va -z .env $TARGET_HOST:tracker/
      - rsync -va -z docker-compose.prod.yml $TARGET_HOST:tracker/compose.yaml

  test:
    desc: Run tests
    cmds:
      - uv pip install --system -e ".[test,dev,security]"
      - pytest tests/ -v
