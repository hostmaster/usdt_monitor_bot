---
name: Security

on:
  pull_request:
    paths:
      - "**.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/security.yml"
  push:
    paths:
      - "**.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/security.yml"
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.4"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        # Upgrade pip to >=26.1 to address CVE-2026-3219 in the runner's
        # bundled pip (flagged by pip-audit below).
        run: |
          uv pip install --system --upgrade 'pip>=26.1'
          uv pip install --system -e ".[security,test]"
      - name: Run Bandit
        run: |
          bandit --baseline baseline.json -r usdt_monitor_bot/
      - name: Check dependencies for known vulnerabilities
        run: |
          pip-audit
