---
name: Security

on:
  pull_request:
    paths:
      - "**.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/security.yml"
  push:
    paths:
      - "**.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/security.yml"
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Set up Python 3.14
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14.5"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        # Upgrade pip to >=26.1 to address CVE-2026-3219 in the runner's
        # bundled pip (flagged by pip-audit below).
        # Install from the locked uv.lock so pip-audit audits what ships in
        # production, not a freshly-resolved set of transitive dependencies.
        run: |
          uv pip install --system --upgrade 'pip>=26.1'
          uv export --frozen --extra security --extra test -o /tmp/requirements.txt
          uv pip install --system -r /tmp/requirements.txt
      - name: Run Bandit
        run: |
          bandit --baseline baseline.json -r usdt_monitor_bot/
      - name: Verify Bandit baseline is current
        run: |
          bandit -r usdt_monitor_bot/ -f json -o /tmp/bandit-fresh.json -q
          python -c "
          import json, sys
          with open('baseline.json') as f:
              baseline = json.load(f)
          with open('/tmp/bandit-fresh.json') as f:
              fresh = json.load(f)
          if baseline.get('errors') != fresh.get('errors'):
              print('baseline.json is stale (errors differ); regenerate with:', file=sys.stderr)
              print('  bandit -r usdt_monitor_bot/ -f json -o baseline.json', file=sys.stderr)
              sys.exit(1)
          "
      - name: Check dependencies for known vulnerabilities
        run: |
          # CVE-2026-34993 and CVE-2026-47265 require aiohttp>=3.14.0, but
          # aiogram==3.28.2 (latest) constrains aiohttp<3.14. Ignored until
          # aiogram releases support for aiohttp 3.14.x.
          pip-audit \
            --ignore-vuln CVE-2026-34993 \
            --ignore-vuln CVE-2026-47265
